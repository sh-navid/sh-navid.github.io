<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="manifest" href="app.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Micro Web Apps">
    <meta name="apple-mobile-web-app-title" content="Micro Web Apps">
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-navbutton-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="index.css">

    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

    <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <!-- JQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"
        integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
</head>

<template class="t-task">
    <div class="task row">
        <div class="col s8 f-field f-input  f-title    " edit="true" view="true">Title</div>
        <div class="col s2 f-field f-input  f-date     " edit="true" view="true">Date</div>
        <div class="col s2">
            <div class="row">
                <div class="col f-field f-switch f-done     " edit="false" view="true">IsDone</div>
                <div class="col f-field f-switch f-recursive" edit="true" view="false">IsRecursive</div>
                <div class="col f-field f-button f-save     " edit="true" view="false">Save</div>
            </div>
        </div>
    </div>
</template>

<body>
    <div class="container">
        <div class="tasks"></div>
        <div class="btn-add-task" onclick="add()">Add</div>
    </div>
</body>

<script>
    const data = [
        { "title": "", "done": false, "repeat": false, "start-date": "2023-01-01" },
    ];

    const add = () => {
        let tmp = $($(".t-task").html() + "");
        $(".tasks").append(tmp);
    }
</script>

</html>
