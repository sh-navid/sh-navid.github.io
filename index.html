<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="manifest" href="index.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Micro Web Apps">
    <meta name="apple-mobile-web-app-title" content="Micro Web Apps">
    <meta name="theme-color" content="hotpink">
    <meta name="msapplication-navbutton-color" content="hotpink">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no; viewport-fit=cover">

    <link rel="stylesheet" href="index.css">

    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

    <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <!-- JQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"
        integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>

    <!-- Main JS + Service Worker-->
    <script src="index.js"></script>
</head>

<template class="t-task">
    <div class="task row">
        <div class="col s5 m8 f-field f-input  f-title " edit="true" view="true">Title</div>
        <div class="col s3 m2 f-field f-input  f-date  " edit="true" view="true"><span>Date</span></div>
        <div class="col s4 m2">
            <div class="row">
                <div class="col s6 f-field f-switch f-recursive" edit="true" view="true">Rec</div>
                <div class="col s6 f-field f-switch f-done     " edit="false" view="true">Done</div>
                <div class="col s6 f-field f-button f-save     " edit="true" view="false">Save</div>
            </div>
        </div>
    </div>
</template>

<body>
    <div class="container-fluid banner"></div>
    <div class="container-fluid banner-dummy"></div>

    <div class="container-fluid footer">
        <div class="footer-container">
            <div class="footer-btn" onclick="add()"><div><img src="assets/icons/1.png" alt=""/></div></div>
            <div class="footer-btn" onclick="add()"><div><img src="assets/icons/2.png" alt=""/></div></div>
            <div class="footer-btn" onclick="add()"><div><img src="assets/icons/3.png" alt=""/></div></div>
        </div>
    </div>
    <div class="container-fluid footer-dummy"></div>

    <div class="container">
        <div class="tasks"></div>
    </div>
</body>

<script>
    const data = [
        { "title": "Buy milk", "done": false, "repeat": false, "start-date": "2023-01-01" },
        { "title": "GYM", "done": false, "repeat": true, "start-date": "2023-01-01" },
        { "title": "Drink Water", "done": true, "repeat": true, "start-date": "2023-01-01" },
        { "title": "Job", "done": true, "repeat": true, "start-date": "2023-01-01" },
    ];

    const loadTasks = () => {
        data.forEach((t) => {
            add(false, t["title"], t["start-date"]);
        });
    }

    const add = (isEditMode = true, title = "...", date = "...") => {
        let tmp = $($(".t-task").html() + "");
        tmp.find(".f-title").html(title);
        tmp.find(".f-date>span").html(date);


        if (isEditMode) {
            tmp.find(".f-done").css({ "display": "none" })
        } else {
            tmp.find(".f-save").css({ "display": "none" })
        }


        $(".tasks").append(tmp);
    }

    loadTasks();
</script>

</html>
