<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="manifest" href="index.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="EN 2 FA Flash Card">
    <meta name="apple-mobile-web-app-title" content="EN 2 FA Flash Card">
    <meta name="theme-color" content="#303030" />
    <meta name="msapplication-navbutton-color" content="#303030">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no; viewport-fit=cover">

    <link rel="stylesheet" href="index.css">

    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

    <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <!-- JQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"
        integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>

    <!-- Main JS + Service Worker-->
    <script src="index.js"></script>
</head>

<template class="t-task">
    <div class="task row">
        <div class="col s2 m1" onclick="incScore(this,-1)">
            <div class="f-field f-dec"></div>
        </div>
        <div class="col s8 m10 f-field" onclick="showTrans(this)">
            <span>&nbsp;</span>
            <div class="f-progress"></div>
            <div class="f-word"></div>
            <div class="f-trans"></div>
        </div>
        <div class="col s2 m1" onclick="incScore(this,1)">
            <div class="f-field f-inc"></div>
        </div>
    </div>
</template>

<body>
    <div class="container-fluid banner">
        <div class="banner-progress"></div>
    </div>
    <div class="container-fluid banner-dummy"></div>
    <div class="container">
        <div class="tasks"></div>
    </div>
    <div class="container-fluid footer">
        <div class="footer-container">
            <div class="footer-btn">
                <div><img src="assets/icons/1.png" alt="" /></div>
            </div>
            <div class="footer-btn">
                <div><img src="assets/icons/2.png" alt="" /></div>
            </div>
            <div class="footer-btn">
                <div><img src="assets/icons/3.png" alt="" /></div>
            </div>
        </div>
    </div>
    <div class="container-fluid footer-dummy"></div>
</body>

<script>
    const data = [
        {
            id: 1,
            word: "Abandon",
            trans: "رها کردن",
            score: 10
        },
        {
            id: 2,
            word: "Keen",
            trans: "تیز",
            score: 9
        },
        {
            id: 3,
            word: "Jealous",
            trans: "حسود",
            score: 8
        },
        {
            id: 4,
            word: "Tact",
            trans: "تدبیر",
            score: 7
        },
        {
            id: 5,
            word: "Oath",
            trans: "سوگند، دشنام",
            score: 6
        },
        {
            id: 6,
            word: "Vacant",
            trans: "خالی",
            score: 5
        },
        {
            id: 7,
            word: "Hardship",
            trans: "سختی",
            score: 4
        },
        {
            id: 8,
            word: "Gallant",
            trans: "شجاع",
            score: 3
        },
        {
            id: 9,
            word: "Data",
            trans: "داده ها",
            score: 2
        },
        {
            id: 10,
            word: "Unaccustomed",
            trans: "غیرعادی",
            score: 1
        },
    ];

    COLORS = ["CE93D8", "F48FB1", "EF9A9A", "FFAB91", "FFCC80", "FFD54F", "FFEE58", "CDDC39", "7CB342", "4CAF50"];
    FORECS = ["212121", "212121", "212121", "212121", "212121", "212121", "212121", "212121", "EFEFEF", "EFEFEF"];

    let hideTransInt;
    const showTrans = (el) => {
        $(".f-trans").removeClass("active");
        $(el).children(".f-trans").addClass("active");

        clearTimeout(hideTransInt);
        hideTransInt = setTimeout(() => {
            $(".f-trans").removeClass("active");
        }, 2500);
    }

    const loadTasks = () => {
        data.forEach((t) => {
            add(t["id"], t["word"], t["trans"], t["score"]);
        });
    }

    const update = (id,score) => {
        let tmp = $(`[wid=${id}]`);

        tmp.find(".f-progress").css({ "width": score * 10 + "%" });
        tmp.find(".f-progress").css({ "background-color": "#" + COLORS[score - 1] });
        tmp.find(".f-progress").html(score + "/10");
    }

    const add = (id = -1, title = "...", trans = "...", score = 1) => {
        let tmp = $($(".t-task").html() + "");
        tmp.attr("wid", id);

        tmp.find(".f-word").html(title);
        tmp.find(".f-trans").html(trans);
        tmp.find(".f-trans").css({ "background-color": "#" + COLORS[score - 1] });
        tmp.find(".f-trans").css({ "color": "#" + FORECS[score - 1] });

        $(".tasks").append(tmp);
        update(id, score);
    }



    const updateBannerProgress = () => {
        let max = data.length * 10;
        let cur = 0;
        for (let x of data)
            cur += x.score;
        cur -= data.length;
        $(".banner-progress").css({ "width": (cur * 100 / max) + "%" });
        $(".banner-progress").html(cur + "/100%")
    }

    const incScore = (el, step = 1) => {
        let id = parseInt($(el).parent().attr("wid"));
        data.forEach((item) => {
            if (item.id == id) {
                item.score += step;
                if (item.score > 10) item.score = 10;
                else if (item.score < 1) item.score = 1;
                update(id, item.score);
            }
        })
        updateBannerProgress();
    }

    updateBannerProgress();
    loadTasks();
</script>

</html>
