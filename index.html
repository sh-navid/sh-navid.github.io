<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="manifest" href="index.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Micro Web Apps">
    <meta name="apple-mobile-web-app-title" content="Micro Web Apps">
    <meta name="theme-color" content="#212121">
    <meta name="msapplication-navbutton-color" content="#212121">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no; viewport-fit=cover">

    <link rel="stylesheet" href="index.css">

    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

    <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <!-- JQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"
        integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>

    <!-- Main JS + Service Worker-->
    <script src="index.js"></script>
</head>

<template class="t-task">
    <div class="task row">
        <div class="col s8 m9 f-field   f-title " onclick="showTrans(this)">Word<div class="f-trans">Trans</div></div>
        <div class="col s1 m1 f-field   f-dec   ">-</div>
        <div class="col s2 m1 f-field   f-score ">0</div>
        <div class="col s1 m1 f-field   f-inc   ">+</div>
    </div>
</template>

<body>
    <div class="container-fluid banner"></div>
    <div class="container-fluid banner-dummy"></div>
    <div class="container">
        <div class="tasks"></div>
    </div>
    <div class="container-fluid footer">
        <div class="footer-container">
            <div class="footer-btn" onclick="add()">
                <div><img src="assets/icons/1.png" alt="" /></div>
            </div>
            <div class="footer-btn" onclick="add()">
                <div><img src="assets/icons/2.png" alt="" /></div>
            </div>
            <div class="footer-btn" onclick="add()">
                <div><img src="assets/icons/3.png" alt="" /></div>
            </div>
        </div>
    </div>
    <div class="container-fluid footer-dummy"></div>
</body>

<script>
    const data = [
        {
            id: 1,
            word: "Abandon",
            trans: "رها کردن",
            score: 0
        },
        {
            id: 2,
            word: "Keen",
            trans: "تیز",
            score: 0
        },
        {
            id: 3,
            word: "Jealous",
            trans: "حسود",
            score: 0
        },
        {
            id: 4,
            word: "Tact",
            trans: "تدبیر",
            score: 0
        },
        {
            id: 5,
            word: "Oath",
            trans: "سوگند، دشنام",
            score: 0
        },
        {
            id: 6,
            word: "Vacant",
            trans: "خالی",
            score: 0
        },
        {
            id: 7,
            word: "Hardship",
            trans: "سختی",
            score: 0
        },
        {
            id: 8,
            word: "Gallant",
            trans: "شجاع",
            score: 0
        },
        {
            id: 9,
            word: "Data",
            trans: "داده ها",
            score: 0
        },
        {
            id: 10,
            word: "Unaccustomed",
            trans: "غیرعادی",
            score: 0
        },
    ];

    const showTrans=(el)=>{
        $(".f-trans").removeClass("active");
        $(el).children(".f-trans").addClass("active");

        setTimeout(()=>{
            $(".f-trans").removeClass("active");
        },3000);
    }

    const loadTasks = () => {
        data.forEach((t) => {
            add(t["word"], t["trans"]);
        });
    }

    const add = (title = "...", trans = "...") => {
        let tmp = $($(".t-task").html() + "");
        tmp.find(".f-title").html(title);
        tmp.find(".f-trans").html(trans);
        $(".tasks").append(tmp);
    }

    loadTasks();
</script>

</html>
